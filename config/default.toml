[bot]
endpoint = "wss://game.riichi.dev/ws/validate"
token_env = "RIICHI_BOT_TOKEN"

[data]
raw_dir = "data/raw"
processed_dir = "data/processed"

[model]
artifact_path = "models/policy.pt"

[training]
batch_size = 512
epochs = 5
device = "auto"
learning_rate = 0.001
hidden_size = 512
model_arch = "mlp"
validation_ratio = 0.1
seed = 7
num_workers = 0
early_stopping_patience = 3
action_type_weight_power = 0.5

[evaluation]
games = 100
timeout_seconds = 3.0
